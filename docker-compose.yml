version: '3.7'
services:
  superset:
    image: apache/superset:latest
    ports:
      - "8088:8088"
    environment:
      SUPERSET_ENV: development
    volumes:
      - superset_home:/app/superset_home
    command:
      - "/bin/sh"
      - "-c"
      - |
        superset fab create-admin \
          --username admin \
          --firstname Admin \
          --lastname User \
          --email admin@superset.com \
          --password admin
        superset db upgrade
        superset init
        superset run -h 0.0.0.0 -p 8088

volumes:
  superset_home:
